<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sign In · Resilience Toolkit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #146B5C 0%, #0E4F44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #FFFFFF;
            border-radius: 56px;
            padding: 2rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.25);
        }
        h1 { color: #0C2E3B; font-size: 1.9rem; margin: 0.75rem 0 1rem; font-weight: 700; }
        .input-group { margin: 1rem 0 0.5rem; text-align: left; }
        label { font-size: 0.85rem; font-weight: 600; color: #1A4E44; display: block; margin-bottom: 0.25rem; }
        input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 2px solid #E2E9F2;
            border-radius: 60px;
            font-size: 1rem;
            background: #FEFEFE;
            font-family: inherit;
            transition: border 0.2s;
        }
        input:focus { outline: none; border-color: #1A6B5A; box-shadow: 0 0 0 3px rgba(26, 107, 90, 0.2); }
        button {
            width: 100%;
            background: #1A6B5A;
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.75rem 0 0.5rem;
            transition: all 0.2s;
        }
        button:hover { background: #0F5446; }
        button:active { transform: scale(0.97); }
        .error-box { background: #FFEBEE; color: #B33A3A; padding: 0.7rem; border-radius: 40px; margin-top: 0.9rem; font-size: 0.85rem; display: none; text-align: center; }
        .success-box { background: #1A6B5A; color: white; padding: 0.7rem; border-radius: 40px; margin-top: 0.9rem; font-size: 0.85rem; display: none; text-align: center; }
        .warning-box { background: #FFF3E0; color: #E8A735; padding: 0.7rem; border-radius: 40px; margin-top: 0.9rem; font-size: 0.85rem; display: none; text-align: center; }
        .info-box { background: #E0F2E9; color: #146B5C; padding: 0.7rem; border-radius: 40px; margin-top: 0.9rem; font-size: 0.85rem; display: none; text-align: center; }
        .footer-note { font-size: 0.7rem; color: #7C8B9A; margin-top: 1rem; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1A6B5A; color: white; padding: 12px 24px; border-radius: 60px; z-index: 2000; font-size: 0.9rem; animation: slideUp 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .verified-badge { display: inline-block; background: #1A6B5A20; color: #1A6B5A; padding: 4px 12px; border-radius: 60px; font-size: 0.75rem; margin-left: 8px; }
    </style>
</head>
<body>
<div class="card">
    <div style="font-size: 2.8rem;">🏔️</div>
    <h1>The Resilience Toolkit</h1>

    <div class="input-group">
        <label>📧 Email address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
    </div>
    
    <button id="loginBtn">🔐 Sign In</button>
    <div id="loginError" class="error-box"></div>
    <div class="footer-note">⚡ Secure platform for humanitarian leaders</div>
</div>

<script>
    // ========== GOOGLE SCRIPT URL ==========
    const YOUR_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzW7wR1VIIlu5s76CaWCD4xsVi6nUns6MKNKrfT-eoEA0XTKrpgBx47EXGqrRxcTuDk/exec';
    const BASE_URL = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString();
    }

    // CRITICAL FIX: Load users from localStorage OR initialize from sessionStorage if coming from registration
    function loadUsers() {
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // Check if we have a pending user from registration (stored in sessionStorage)
        const pendingUser = sessionStorage.getItem('pendingVerifiedUser');
        if (pendingUser) {
            try {
                const pendingUserData = JSON.parse(pendingUser);
                const existingIndex = users.findIndex(u => u.email === pendingUserData.email);
                if (existingIndex === -1) {
                    users.push(pendingUserData);
                    localStorage.setItem('users', JSON.stringify(users));
                    console.log('✅ Pending user added to localStorage:', pendingUserData.email);
                }
                // Clear pending after adding
                sessionStorage.removeItem('pendingVerifiedUser');
            } catch(e) {
                console.error('Error loading pending user:', e);
            }
        }
        
        return users;
    }

    function login() {
        let email = document.getElementById('loginEmail').value.trim();
        let password = document.getElementById('loginPassword').value;
        let errDiv = document.getElementById('loginError');

        errDiv.style.display = 'none';
        errDiv.className = 'error-box';

        if (!email) {
            errDiv.innerText = '❌ Please enter your email address.';
            errDiv.style.display = 'block';
            return;
        }

        if (!password) {
            errDiv.innerText = '❌ Please enter your password.';
            errDiv.style.display = 'block';
            return;
        }

        let users = loadUsers(); // Use the enhanced load function
        let user = users.find(u => u.email === email);

        if (!user) {
            errDiv.innerText = '❌ No account found. Please create a new account.';
            errDiv.style.display = 'block';
            return;
        }

        if (!user.verified) {
            errDiv.className = 'warning-box';
            if (user.language === 'ar') {
                errDiv.innerHTML = '⚠️ الرجاء تفعيل بريدك الإلكتروني أولاً! تحقق من بريدك الوارد.';
            } else {
                errDiv.innerHTML = '⚠️ Please verify your email first! Check your inbox.';
            }
            errDiv.style.display = 'block';
            return;
        }

        const hashedInputPassword = simpleHash(password);
        if (user.password !== hashedInputPassword) {
            errDiv.innerText = '❌ Incorrect password. Please try again.';
            errDiv.style.display = 'block';
            return;
        }

        const signInData = {
            action: 'signin',
            name: user.name,
            email: user.email,
            position: user.position,
            country: user.country,
            organization: user.organization,
            language: user.language,
            linkedin_social: user.combinedSocial || '',
            status: 'Signed In',
            timestamp: new Date().toISOString()
        };
        
        fetch(YOUR_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(signInData)
        }).catch(err => console.error('Sign in save error:', err));

        localStorage.setItem('currentUser', JSON.stringify(user));
        errDiv.className = 'success-box';
        errDiv.innerHTML = `✅ Welcome back ${user.name}! Redirecting...`;
        errDiv.style.display = 'block';

        setTimeout(() => {
            const preferredLang = user.language || 'en';
            if (preferredLang === 'ar') {
                window.location.href = BASE_URL + 'ar/intro.html';
            } else {
                window.location.href = BASE_URL + 'en/intro.html';
            }
        }, 1500);
    }

    // ========== FIXED: Auto-verify with improved logic ==========
    (function autoVerify() {
        console.log('🔍 autoVerify running...');
        const urlParams = new URLSearchParams(window.location.search);
        const verifyEmail = urlParams.get('verify');
        
        console.log('📧 verifyEmail from URL:', verifyEmail);
        
        if (verifyEmail) {
            let users = loadUsers(); // Use enhanced load function
            console.log('👥 Users found:', users.length);
            
            let user = users.find(u => u.email === verifyEmail);
            let errDiv = document.getElementById('loginError');
            
            if (user) {
                console.log('✅ User found:', user.name);
                
                if (!user.verified) {
                    user.verified = true;
                    localStorage.setItem('users', JSON.stringify(users));
                    localStorage.setItem(`verified_${verifyEmail}`, 'true');
                    console.log('✅ Account verified successfully!');
                    
                    // Auto-fill email
                    document.getElementById('loginEmail').value = verifyEmail;
                    document.getElementById('loginPassword').focus();
                    
                    // Remove verify param from URL for cleaner experience
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    errDiv.className = 'success-box';
                    if (user.language === 'ar') {
                        errDiv.innerHTML = `✅ تم تفعيل بريدك الإلكتروني (${verifyEmail}) بنجاح! الرجاء إدخال كلمة المرور للمتابعة إلى الدورة.`;
                    } else {
                        errDiv.innerHTML = `✅ Your email (${verifyEmail}) has been verified successfully! Please enter your password to continue to the course.`;
                    }
                    errDiv.style.display = 'block';
                } else {
                    console.log('ℹ️ User already verified');
                    document.getElementById('loginEmail').value = verifyEmail;
                    errDiv.className = 'info-box';
                    if (user.language === 'ar') {
                        errDiv.innerHTML = `ℹ️ هذا البريد مفعل بالفعل. الرجاء إدخال كلمة المرور للمتابعة.`;
                    } else {
                        errDiv.innerHTML = `ℹ️ This email is already verified. Please enter your password to continue.`;
                    }
                    errDiv.style.display = 'block';
                }
            } else {
                console.log('❌ User not found for email:', verifyEmail);
                console.log('💡 Tip: Make sure you completed registration first');
                
                // Try to check if this is from a pending registration
                const pendingUser = sessionStorage.getItem('pendingVerifiedUser');
                if (pendingUser) {
                    const pendingData = JSON.parse(pendingUser);
                    if (pendingData.email === verifyEmail) {
                        console.log('✅ Found pending user in session storage, verifying now...');
                        pendingData.verified = true;
                        users.push(pendingData);
                        localStorage.setItem('users', JSON.stringify(users));
                        sessionStorage.removeItem('pendingVerifiedUser');
                        
                        document.getElementById('loginEmail').value = verifyEmail;
                        errDiv.className = 'success-box';
                        errDiv.innerHTML = `✅ Account verified! Please enter your password to continue.`;
                        errDiv.style.display = 'block';
                        return;
                    }
                }
                
                errDiv.className = 'error-box';
                errDiv.innerHTML = `❌ Email not found. Please complete registration first. <a href="index.html" style="color:#1A6B5A;">Register here →</a>`;
                errDiv.style.display = 'block';
            }
        } else {
            console.log('ℹ️ No verify parameter found in URL');
        }
    })();

    // Handle email parameter from registration redirect
    const urlParams = new URLSearchParams(window.location.search);
    const emailParam = urlParams.get('email');
    if (emailParam) {
        document.getElementById('loginEmail').value = emailParam;
        // Show helpful message
        let errDiv = document.getElementById('loginError');
        errDiv.className = 'info-box';
        errDiv.innerHTML = `📧 Registration complete! Please check your email for verification link. A verification email has been sent to ${emailParam}.`;
        errDiv.style.display = 'block';
    }

    document.getElementById('loginBtn').onclick = login;

    const loginEmail = document.getElementById('loginEmail');
    const loginPass = document.getElementById('loginPassword');
    if (loginEmail) loginEmail.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    if (loginPass) loginPass.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });

    console.log('✅ Login page ready');
</script>
</body>
</html>
