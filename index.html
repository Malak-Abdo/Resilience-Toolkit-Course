<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Register · Resilience Toolkit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #146B5C 0%, #0E4F44 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #FFFFFF;
            border-radius: 56px;
            padding: 2rem;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.25);
        }
        h1 { color: #0C2E3B; font-size: 1.9rem; margin: 0.5rem 0 0.5rem; font-weight: 700; text-align: center; }
        h2 { color: #1A4E44; font-size: 1rem; margin-bottom: 1.5rem; text-align: center; font-weight: normal; }
        .input-group { margin: 0.8rem 0; text-align: left; }
        label { font-size: 0.85rem; font-weight: 600; color: #1A4E44; display: block; margin-bottom: 0.25rem; }
        input, select {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 2px solid #E2E9F2;
            border-radius: 60px;
            font-size: 1rem;
            background: #FEFEFE;
            font-family: inherit;
            transition: border 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: #1A6B5A; box-shadow: 0 0 0 3px rgba(26, 107, 90, 0.2); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        button {
            width: 100%;
            background: #1A6B5A;
            color: white;
            padding: 0.9rem;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin: 1rem 0 0.5rem;
            transition: all 0.2s;
        }
        button:hover { background: #0F5446; }
        button:active { transform: scale(0.97); }
        .error-box, .success-box, .info-box {
            padding: 0.7rem;
            border-radius: 40px;
            margin-top: 0.9rem;
            font-size: 0.85rem;
            display: none;
            text-align: center;
        }
        .error-box { background: #FFEBEE; color: #B33A3A; }
        .success-box { background: #1A6B5A; color: white; }
        .info-box { background: #E0F2E9; color: #146B5C; }
        .footer-note { font-size: 0.7rem; color: #7C8B9A; margin-top: 1.5rem; text-align: center; }
        .login-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .login-link a { color: #1A6B5A; text-decoration: none; font-weight: 600; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div style="text-align: center; font-size: 2.5rem;">🏔️</div>
    <h1>The Resilience Toolkit</h1>
    <h2>Create your account to begin</h2>

    <div class="input-group">
        <label>👤 Full Name</label>
        <input type="text" id="fullName" placeholder="e.g., Ahmed Al-Mansouri" autocomplete="name">
    </div>

    <div class="row-2">
        <div class="input-group">
            <label>📧 Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" id="password" placeholder="At least 6 characters">
        </div>
    </div>

    <div class="row-2">
        <div class="input-group">
            <label>💼 Position / Title</label>
            <input type="text" id="position" placeholder="e.g., Program Manager">
        </div>
        <div class="input-group">
            <label>🌍 Country</label>
            <input type="text" id="country" placeholder="e.g., Yemen, Syria, Sudan">
        </div>
    </div>

    <div class="row-2">
        <div class="input-group">
            <label>🏢 Organization</label>
            <input type="text" id="organization" placeholder="Organization name">
        </div>
        <div class="input-group">
            <label>🌐 Language</label>
            <select id="language">
                <option value="en">English</option>
                <option value="ar">العربية</option>
            </select>
        </div>
    </div>

    <div class="input-group">
        <label>🔗 LinkedIn Profile (optional)</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/yourprofile">
    </div>

    <button id="registerBtn">🚀 Start Your Journey</button>
    <div id="registerMessage" class="error-box"></div>
    
    <div class="login-link">
        Already have an account? <a href="login.html">Sign in →</a>
    </div>
    <div class="footer-note">⚡ Free access for humanitarian leaders</div>
</div>

<script>
    // ========== CONFIGURATION ==========
    const YOUR_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVD8WJkgtcg51Onjb0Uu5DQZqvHsoXZlLJ35hGczmwXKbV_xsngRlKi_f4RJlFA30XKQ/exec';
    const BASE_URL = window.location.origin + window.location.pathname.replace(/[^/]*$/, '');

    // Simple hash function (must match login page)
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString();
    }

    // ========== CRITICAL: Save user to localStorage ==========
    function saveUserToLocalStorage(userData) {
        // Get existing users
        let users = JSON.parse(localStorage.getItem('users') || '[]');
        
        // Check if user already exists
        const existingUserIndex = users.findIndex(u => u.email === userData.email);
        
        if (existingUserIndex === -1) {
            // Add new user
            users.push(userData);
            console.log('✅ New user added to localStorage');
        } else {
            // Update existing user
            users[existingUserIndex] = userData;
            console.log('✅ Existing user updated in localStorage');
        }
        
        // Save back to localStorage
        localStorage.setItem('users', JSON.stringify(users));
        
        console.log('📊 Total users in localStorage:', users.length);
        console.log('✅ User saved:', userData.email, '| Verified:', userData.verified);
        
        // Also store separately for easy access
        localStorage.setItem(`user_${userData.email}`, JSON.stringify(userData));
        
        // Verify save worked
        const verifyUsers = JSON.parse(localStorage.getItem('users') || '[]');
        console.log('🔍 Verification - Users in storage:', verifyUsers.map(u => u.email));
        
        return true;
    }

    // ========== MAIN REGISTRATION FUNCTION ==========
    async function register() {
        // Get form values
        const name = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const position = document.getElementById('position').value.trim();
        const country = document.getElementById('country').value.trim();
        const organization = document.getElementById('organization').value.trim();
        const language = document.getElementById('language').value;
        const linkedin = document.getElementById('linkedin').value.trim();

        const messageDiv = document.getElementById('registerMessage');
        messageDiv.style.display = 'none';
        messageDiv.className = 'error-box';

        // Validation
        if (!name) {
            messageDiv.innerText = '❌ Please enter your full name.';
            messageDiv.style.display = 'block';
            return;
        }

        if (!email) {
            messageDiv.innerText = '❌ Please enter your email address.';
            messageDiv.style.display = 'block';
            return;
        }

        if (!email.includes('@')) {
            messageDiv.innerText = '❌ Please enter a valid email address.';
            messageDiv.style.display = 'block';
            return;
        }

        if (!password || password.length < 6) {
            messageDiv.innerText = '❌ Password must be at least 6 characters.';
            messageDiv.style.display = 'block';
            return;
        }

        if (!position) {
            messageDiv.innerText = '❌ Please enter your position/title.';
            messageDiv.style.display = 'block';
            return;
        }

        if (!country) {
            messageDiv.innerText = '❌ Please enter your country.';
            messageDiv.style.display = 'block';
            return;
        }

        // Check if user already exists in localStorage
        let existingUsers = JSON.parse(localStorage.getItem('users') || '[]');
        let existingUser = existingUsers.find(u => u.email === email);
        
        if (existingUser && existingUser.verified) {
            messageDiv.innerText = '❌ An account with this email already exists. Please sign in instead.';
            messageDiv.style.display = 'block';
            return;
        }

        // Hash password
        const hashedPassword = simpleHash(password);

        // Create user object
        const userData = {
            name: name,
            email: email,
            password: hashedPassword,
            position: position,
            country: country,
            organization: organization || 'Not specified',
            language: language,
            verified: false,  // CRITICAL: Not verified until email click
            combinedSocial: linkedin || '',
            registrationDate: new Date().toISOString()
        };

        // ========== STEP 1: Save to localStorage FIRST ==========
        console.log('💾 Saving user to localStorage...');
        saveUserToLocalStorage(userData);
        
        // Verify immediately that save worked
        const verifySaved = JSON.parse(localStorage.getItem('users') || '[]');
        const found = verifySaved.find(u => u.email === email);
        
        if (!found) {
            console.error('❌ CRITICAL: User was NOT saved to localStorage!');
            messageDiv.innerText = '❌ System error: Could not save user data. Please try again.';
            messageDiv.style.display = 'block';
            return;
        }
        
        console.log('✅ User verified in localStorage:', found.email, 'Verified status:', found.verified);

        // ========== STEP 2: Send to Google Sheets for email ==========
        messageDiv.className = 'info-box';
        messageDiv.innerHTML = '📧 Creating your account and sending verification email...';
        messageDiv.style.display = 'block';

        // Prepare data for Google Sheets (includes verification link)
        const scriptData = {
            action: 'register',
            name: name,
            email: email,
            position: position,
            country: country,
            organization: organization || 'Not specified',
            language: language,
            password: hashedPassword,
            linkedin_social: linkedin || '',
            verificationLink: `https://malak-abdo.github.io/Resilience-Toolkit-Course/login.html?verify=${encodeURIComponent(email)}`,
            timestamp: new Date().toISOString()
        };

        try {
            // Send to Google Apps Script
            await fetch(YOUR_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scriptData)
            });
            
            console.log('✅ Registration data sent to Google Sheets');
            
            // Success message
            messageDiv.className = 'success-box';
            if (language === 'ar') {
                messageDiv.innerHTML = `✅ تم إنشاء حسابك بنجاح! تم إرسال رابط التفعيل إلى بريدك الإلكتروني (${email}). الرجاء التحقق من بريدك الوارد والنقر على الرابط لتفعيل حسابك.`;
            } else {
                messageDiv.innerHTML = `✅ Account created successfully! A verification link has been sent to ${email}. Please check your inbox and click the link to verify your account.`;
            }
            messageDiv.style.display = 'block';
            
            // Clear form
            document.getElementById('fullName').value = '';
            document.getElementById('password').value = '';
            
            // Redirect to login page after 4 seconds
            setTimeout(() => {
                window.location.href = BASE_URL + 'login.html?email=' + encodeURIComponent(email);
            }, 4000);
            
        } catch (error) {
            console.error('❌ Error sending to Google Sheets:', error);
            messageDiv.className = 'error-box';
            if (language === 'ar') {
                messageDiv.innerHTML = `❌ حدث خطأ في إرسال البريد الإلكتروني. لكن تم حفظ حسابك. الرجاء المحاولة مرة أخرى أو الاتصال بالدعم.`;
            } else {
                messageDiv.innerHTML = `❌ Error sending verification email, but your account was saved. Please try again or contact support.`;
            }
            messageDiv.style.display = 'block';
        }
    }

    // ========== CHECK FOR EXISTING VERIFIED USER ==========
    function checkExistingUser() {
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === emailParam);
            if (user && user.verified) {
                const messageDiv = document.getElementById('registerMessage');
                messageDiv.className = 'info-box';
                messageDiv.innerHTML = `ℹ️ Account already exists and is verified. <a href="login.html" style="color:#146B5C;">Sign in here →</a>`;
                messageDiv.style.display = 'block';
            }
        }
    }

    // Event listeners
    document.getElementById('registerBtn').onclick = register;
    
    // Enter key support
    const inputs = ['fullName', 'email', 'password', 'position', 'country', 'organization', 'linkedin'];
    inputs.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });
    });
    document.getElementById('language').addEventListener('keypress', (e) => { if (e.key === 'Enter') register(); });

    // Run on page load
    checkExistingUser();
    console.log('✅ Registration page ready');
    console.log('📋 Current localStorage users:', JSON.parse(localStorage.getItem('users') || '[]'));
</script>
</body>
</html>
